[build]
builder = "NIXPACKS"

[deploy]
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Pin to US East — closest to Polymarket's CLOB servers (AWS us-east)
# This gives ~15-30ms to clob.polymarket.com vs ~100-200ms from other regions
region = "us-east"
